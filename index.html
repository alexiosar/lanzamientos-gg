  <main class="contenedor contenedor-ancho">

      <aside class="sidebar" aria-label="Filtros">

          <div class="filtros-label">BUSCAR JUEGO:</div>

        </div>

        <div class="filtros">
          <div class="filtros-label">VISTA:</div>
          <div class="filtros-botones">
            <button class="filtro-btn vista-btn activo" data-vista="calendario" onclick="cambiarVista('calendario')">CALENDARIO</button>
            <button class="filtro-btn vista-btn" data-vista="ranking" onclick="cambiarVista('ranking')">★ RANKING</button>
          </div>
        </div>

        <div class="filtros">
          <div class="filtros-label">FILTRAR POR PLATAFORMA:</div>
          <div class="filtros-botones">
            <button class="filtro-btn filtro-btn-plat activo" data-plat="TODAS"   onclick="activarFiltro('TODAS')">TODAS</button>
            <button class="filtro-btn filtro-btn-plat"        data-plat="PS5"     onclick="activarFiltro('PS5')">PS5</button>
            <button class="filtro-btn filtro-btn-plat"        data-plat="PS4"     onclick="activarFiltro('PS4')">PS4</button>

            <button class="filtro-btn filtro-btn-plat"        data-plat="SWITCH2" onclick="activarFiltro('SWITCH2')">SWITCH 2</button>
            <button class="filtro-btn filtro-btn-plat"        data-plat="SWITCH"  onclick="activarFiltro('SWITCH')">SWITCH</button>
          </div>
        </div>

        <!-- FILTRO GÉNERO (se genera automáticamente desde juegos.js) -->
        <div class="filtros">
          <div class="filtros-label">FILTRAR POR GÉNERO:</div>
          <div class="filtros-botones" id="filtros-genero"></div>
        </div>
      </aside>

    </div>

        <span class="modal-cerrar" onclick="cerrarTrailer()">[ X ] CERRAR</span>

    </div>

  <script src="datos/juegos.js"></script>
  <script src="js/main.js"></script>
  <script>
    // el ícono muestra el tema actual: ☾ oscuro, ☀ claro
    function toggleTema() {
      const claro = document.documentElement.classList.toggle("tema-claro");
      document.getElementById("btn-tema").textContent = claro ? "☀" : "☾";
      localStorage.setItem("tema", claro ? "claro" : "oscuro");
    }

    function aplicarTema(claro) {
      document.documentElement.classList.toggle("tema-claro", claro);
      const btn = document.getElementById("btn-tema");
      if (btn) btn.textContent = claro ? "☀" : "☾";
      else document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("btn-tema").textContent = claro ? "☀" : "☾";
      });
    }

    // sin preferencia guardada se sigue al sistema (cambia solo de día/noche);
    // si el usuario tocó el botón alguna vez, su elección manda
    const temaGuardado = localStorage.getItem("tema");
    const sistemaClaro = window.matchMedia("(prefers-color-scheme: light)");
    aplicarTema(temaGuardado ? temaGuardado === "claro" : sistemaClaro.matches);
    sistemaClaro.addEventListener("change", e => {
      if (!localStorage.getItem("tema")) aplicarTema(e.matches);
    });

    // service worker de la PWA (solo red, sin caché): habilita la instalación en Android
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calendario de lanzamientos de videojuegos para PS5, Xbox y Nintendo Switch 2 en español. Fechas, trailers y fichas completas.">
  <title>LANZAMIENTOS.GG — Calendario de Videojuegos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="contenedor">
      <button class="btn-tema" onclick="toggleTema()" id="btn-tema" title="Cambiar tema" aria-label="Cambiar tema">☾</button>
      <a href="index.html" class="site-logo">LANZAMIENTOS.GG</a>
      <span class="site-tagline">▸ CALENDARIO DE VIDEOJUEGOS EN ESPAÑOL ◂</span>
      <nav class="nav">
        <a href="index.html" class="activo">INICIO</a>
        <a href="index.html?plat=PS5">PS5</a>
        <a href="index.html?plat=XBOX">XBOX</a>
        <a href="index.html?plat=SWITCH2">SWITCH 2</a>
        <a href="index.html?plat=SWITCH">SWITCH</a>
        <a href="index.html?plat=PS4">PS4</a>
      </nav>
    </div>
  </header>

  <main class="contenedor">

    <div class="filtros">
      <div class="filtros-label">BUSCAR JUEGO:</div>
      <input type="text" id="buscador" class="buscador" placeholder="ESCRIBE UN NOMBRE..." oninput="buscarJuego(this.value)" autocomplete="off">
    </div>

    <div class="filtros">
      <div class="filtros-label">FILTRAR POR PLATAFORMA:</div>
      <div class="filtros-botones">
        <button class="filtro-btn filtro-btn-plat activo" data-plat="TODAS"   onclick="activarFiltro('TODAS')">TODAS</button>
        <button class="filtro-btn filtro-btn-plat"        data-plat="PS5"     onclick="activarFiltro('PS5')">PS5</button>
        <button class="filtro-btn filtro-btn-plat"        data-plat="PS4"     onclick="activarFiltro('PS4')">PS4</button>
        <button class="filtro-btn filtro-btn-plat"        data-plat="XBOX"    onclick="activarFiltro('XBOX')">XBOX</button>
        <button class="filtro-btn filtro-btn-plat"        data-plat="SWITCH2" onclick="activarFiltro('SWITCH2')">SWITCH 2</button>
        <button class="filtro-btn filtro-btn-plat"        data-plat="SWITCH"  onclick="activarFiltro('SWITCH')">SWITCH</button>
      </div>
    </div>

        <!-- FILTRO GÉNERO (se genera automáticamente desde juegos.js) -->
    <div class="filtros" style="margin-top:0.75rem;">
      <div class="filtros-label">FILTRAR POR GÉNERO:</div>
      <div class="filtros-botones" id="filtros-genero"></div>
    </div>

    <div id="calendario"></div>

  </main>

  <footer class="site-footer">
    <div class="contenedor" style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap; gap:0.5rem;">
      <span>LANZAMIENTOS.GG &copy; 2025</span>
      <span>DATOS: IGDB.COM <span class="cursor"></span></span>
    </div>
  </footer>

  <!-- MODAL TRAILER -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-contenido">
      <div class="modal-header">
        <span class="modal-titulo" id="modal-titulo"></span>
        <span class="modal-cerrar" onclick="cerrarTrailer()">[ X ] CERRAR</span>
      </div>
      <div class="modal-video">
        <iframe id="modal-iframe" src="" allowfullscreen allow="autoplay"></iframe>
      </div>
    </div>
  </div>

  <script src="datos/juegos.js"></script>
  <script src="js/main.js"></script>
  <script>
    // el ícono muestra el tema actual: ☾ oscuro, ☀ claro
    function toggleTema() {
      const claro = document.documentElement.classList.toggle("tema-claro");
      document.getElementById("btn-tema").textContent = claro ? "☀" : "☾";
      localStorage.setItem("tema", claro ? "claro" : "oscuro");
    }

  // recordar preferencia del usuario
    if (localStorage.getItem("tema") === "claro") {
      document.documentElement.classList.add("tema-claro");
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("btn-tema").textContent = "☀";
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LANZAMIENTOS.LAT</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .ficha-page        { padding: 2rem 0; }
    .breadcrumb        { font-size: 11px; color: var(--gris-5); letter-spacing: 1px; margin-bottom: 1.5rem; }
    .breadcrumb a      { color: var(--gris-5); }
    .breadcrumb a:hover{ color: var(--acento); }
    .juego-titulo-page { font-size: 22px; color: var(--blanco); letter-spacing: 3px; margin-bottom: 0.25rem; }
    .juego-dev-page    { font-size: 11px; color: var(--gris-5); letter-spacing: 2px; margin-bottom: 1.5rem; }
    .seccion           { margin-bottom: 2rem; border-top: 1px solid var(--gris-2); padding-top: 1rem; }
    .seccion-titulo    { font-size: 11px; color: var(--gris-5); letter-spacing: 3px; margin-bottom: 0.75rem; }
    .descripcion-page  { color: var(--gris-7); font-size: 13px; line-height: 2; border-left: 2px solid var(--gris-3); padding-left: 1rem; }
    .meta-grid         { display: flex; gap: 2rem; flex-wrap: wrap; }
    .juego-hero        { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; }
    .juego-hero-info   { flex: 1; min-width: 260px; }
    .portada-page      { width: 160px; flex-shrink: 0; border: 1px solid var(--gris-3); display: block; }
    .portada-page.apaisada { width: 280px; max-width: 100%; }
    .video-wrapper     { position: relative; padding-bottom: 56.25%; height: 0; border: 1px solid var(--gris-3); background: var(--negro); }
    .video-wrapper iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .volver            { display: inline-block; font-size: 11px; color: var(--gris-5); letter-spacing: 2px; margin-bottom: 1.5rem; }
    .volver:hover      { color: var(--acento); }
    .badge-gamepass    { color: var(--xbox); }
    .badge-psplus      { color: var(--ps5); }
    .error-page        { text-align: center; padding: 4rem 0; color: var(--gris-5); letter-spacing: 2px; }
    .error-page a      { color: var(--acento); }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="contenedor">
      <button class="btn-tema" onclick="toggleTema()" id="btn-tema" title="Cambiar tema" aria-label="Cambiar tema">☾</button>
      <a href="../index.html" class="site-logo">LANZAMIENTOS.LAT</a>
      <span class="site-tagline">▸ CALENDARIO DE VIDEOJUEGOS EN ESPAÑOL ◂</span>
      <nav class="nav">
        <a href="../index.html">INICIO</a>
        <a href="../index.html?plat=PS5">PS5</a>
        <a href="../index.html?plat=XBOX">XBOX</a>
        <a href="../index.html?plat=SWITCH2">SWITCH 2</a>
        <a href="../index.html?plat=SWITCH">SWITCH</a>
        <a href="../index.html?plat=PS4">PS4</a>
      </nav>
    </div>
  </header>

  <main class="contenedor">
    <div class="ficha-page" id="contenido">
      <!-- generado por JS -->
    </div>
  </main>

  <footer class="site-footer">
    <div class="contenedor" style="display:flex;justify-content:space-between;width:100%;flex-wrap:wrap;gap:.5rem;">
      <span>LANZAMIENTOS.LAT &copy; 2025</span>
      <span>DATOS: IGDB.COM <span class="cursor"></span></span>
    </div>
  </footer>

  <script src="../datos/juegos.js"></script>
  <script>
    // el ícono muestra el tema actual: ☾ oscuro, ☀ claro
    function toggleTema() {
      const claro = document.documentElement.classList.toggle("tema-claro");
      document.getElementById("btn-tema").textContent = claro ? "☀" : "☾";
      localStorage.setItem("tema", claro ? "claro" : "oscuro");
    }

    // recordar preferencia del usuario
    if (localStorage.getItem("tema") === "claro") {
      document.documentElement.classList.add("tema-claro");
      document.getElementById("btn-tema").textContent = "☀";
    }
  </script>
  <script>
    const MESES_ES = [
      "ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO",
      "JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"
    ];

    function plataformaClass(p) {
      if (p === "PS5")     return "plat-PS5";
      if (p === "PS4")     return "plat-PS4";
      if (p === "XBOX")    return "plat-XBOX";
      if (p === "SWITCH2") return "plat-SWITCH2";
      if (p === "SWITCH")  return "plat-SWITCH";
      return "plat-MULTI";
    }

    function plataformaLabel(p) {
      return p === "SWITCH2" ? "SWITCH 2" : p;
    }

    function claseMetacritic(n) {
      if (n >= 75) return "meta-alto";
      if (n >= 50) return "meta-medio";
      return "meta-bajo";
    }

    function renderError() {
      document.getElementById("contenido").innerHTML = `
        <div class="error-page">
          <p>// JUEGO NO ENCONTRADO</p>
          <br>
          <a href="../index.html">◀ VOLVER AL CALENDARIO</a>
        </div>`;
      document.title = "JUEGO NO ENCONTRADO — LANZAMIENTOS.LAT";
    }

    function renderJuego(j) {
      const fecha = (() => {
        const [y, m, d] = j.fecha.split("-").map(Number);
        return new Date(y, m - 1, d);
      })();
      const fechaStr = `${String(fecha.getDate()).padStart(2,"0")} ${MESES_ES[fecha.getMonth()]} ${fecha.getFullYear()}`;

      const platsHtml = j.plataformas.map(p =>
        `<span class="plat ${plataformaClass(p)}">${plataformaLabel(p)}</span>`
      ).join("");

      const platsMetaHtml = j.plataformas.map(plataformaLabel).join(" / ");

      const tagsHtml = [
        ...j.genero.map(g => `<span class="tag">${g}</span>`),
        ...j.plataformas.map(p =>
          `<span class="plat ${plataformaClass(p)}" style="font-size:10px;padding:2px 7px;">${plataformaLabel(p)}</span>`
        ),
        j.gamepass ? `<span class="tag tag-gamepass">GAME PASS</span>` : "",
        j.psplus   ? `<span class="tag tag-psplus">PS PLUS</span>`    : ""
      ].filter(Boolean).join("");

      const incluidoHtml = [
        j.gamepass ? `<span class="ficha-campo-valor badge-gamepass">GAME PASS ✓</span>` : "",
        j.psplus   ? `<span class="ficha-campo-valor badge-psplus">PS PLUS ✓</span>`    : ""
      ].filter(Boolean).join(" &nbsp; ") || `<span class="ficha-campo-valor">—</span>`;

      const trailerHtml = j.trailer
        ? `<div class="seccion">
             <div class="seccion-titulo">TRAILER OFICIAL</div>
             <div class="video-wrapper">
               <iframe src="${j.trailer}" allowfullscreen allow="autoplay"></iframe>
             </div>
           </div>`
        : "";

      document.title = `${j.titulo} — LANZAMIENTOS.LAT`;
      document.querySelector('meta[name="description"]')?.setAttribute("content",
        `${j.titulo} — fecha de lanzamiento, plataformas y trailer. ${j.descripcion.slice(0, 120)}...`
      ) || (() => {
        const m = document.createElement("meta");
        m.name = "description";
        m.content = `${j.titulo} — fecha de lanzamiento, plataformas y trailer.`;
        document.head.appendChild(m);
      })();

      const portadaHtml = j.imagen
        ? `<img class="portada-page" src="${j.imagen}" alt="Portada de ${j.titulo}" loading="lazy" onerror="this.remove()" onload="if(this.naturalWidth>this.naturalHeight)this.classList.add('apaisada')">`
        : "";

      document.getElementById("contenido").innerHTML = `
        <a href="../index.html" class="volver">◀ VOLVER AL CALENDARIO</a>

        <div class="breadcrumb">
          <a href="../index.html">INICIO</a> &gt;
          <a href="../index.html?plat=${j.plataformas[0]}">${plataformaLabel(j.plataformas[0])}</a> &gt;
          ${j.titulo}
        </div>

        <div class="juego-hero">
          ${portadaHtml}
          <div class="juego-hero-info">
        <h1 class="juego-titulo-page">${j.titulo}</h1>
        <p class="juego-dev-page">${j.desarrollador}</p>

        <div class="seccion">
          <div class="seccion-titulo">DATOS</div>
          <div class="meta-grid">
            <div>
              <span class="ficha-campo-label">FECHA DE LANZAMIENTO</span>
              <span class="ficha-campo-valor">${fechaStr}</span>
            </div>
            <div>
              <span class="ficha-campo-label">PLATAFORMAS</span>
              <div class="plataformas" style="margin-top:3px;">${platsHtml}</div>
            </div>
            <div>
              <span class="ficha-campo-label">GÉNERO</span>
              <span class="ficha-campo-valor">${j.genero.join(" / ")}</span>
            </div>
            <div>
              <span class="ficha-campo-label">INCLUIDO EN</span>
              ${incluidoHtml}
            </div>
            ${j.metacritic ? `
            <div>
              <span class="ficha-campo-label">METACRITIC</span>
              <span class="badge-metacritic ${claseMetacritic(j.metacritic)}">${j.metacritic}</span>
            </div>` : ""}
          </div>
        </div>
          </div>
        </div>

        <div class="seccion">
          <div class="seccion-titulo">DESCRIPCIÓN</div>
          <p class="descripcion-page">${j.descripcion}</p>
        </div>

        <div class="seccion">
          <div class="seccion-titulo">TAGS</div>
          <div class="ficha-tags">${tagsHtml}</div>
        </div>

        ${trailerHtml}
      `;
    }

    // ── INIT ──
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const juego = id ? JUEGOS.find(j => j.id === id) : null;
    juego ? renderJuego(juego) : renderError();
  </script>
</body>
</html>
